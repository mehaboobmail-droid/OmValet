[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"

# Daily shift reminder + unfilled-shift log, 02:30 UTC = 08:00 IST.
[functions."shift-alert"]
  schedule = "30 2 * * *"

# Legacy URLs — keep old SMS links and staff bookmarks working after cutover.
[[redirects]]
  from = "/guest.html"
  to = "/guest"
  status = 301

[[redirects]]
  from = "/portal.html"
  to = "/portal"
  status = 301

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/login.html"
  to = "/login"
  status = 301
